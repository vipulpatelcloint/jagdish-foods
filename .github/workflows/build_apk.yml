name: 🚀 Build Jagdish Foods APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Flutter
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      # 4. Show versions
      - name: 📋 Flutter version info
        run: flutter --version

      # 5. Install dependencies
      - name: 📦 Install dependencies
        run: flutter pub get

      # 6. Run code generation (Hive, Retrofit, etc.)
      - name: ⚙️ Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
        continue-on-error: true   # non-fatal if no generated code yet

      # 7. Analyze code
      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 8. Run tests
      - name: 🧪 Run unit tests
        run: flutter test test/unit/
        continue-on-error: true

      # 9. Build Debug APK (fast, for testing)
      - name: 🔨 Build Debug APK
        run: flutter build apk --debug --target-platform android-arm64

      # 10. Build Release APK (optimized)
      - name: 🏗️ Build Release APK
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --split-per-abi
        env:
          # For signed release, add keystore secrets in GitHub repo settings
          # KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          # KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          # KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          FLUTTER_BUILD_NAME: "1.0.0"
          FLUTTER_BUILD_NUMBER: ${{ github.run_number }}

      # 11. List built APKs
      - name: 📋 List APK files
        run: find build/app/outputs -name "*.apk" -exec ls -lh {} \;

      # 12. Upload Debug APK
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jagdish-foods-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      # 13. Upload Release APKs (split by ABI)
      - name: 📤 Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: jagdish-foods-release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30
          if-no-files-found: warn

      # 14. Create GitHub Release (on tag push)
      - name: 🎉 Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          name: "Jagdish Foods ${{ github.ref_name }}"
          body: |
            ## 🥐 Jagdish Foods App ${{ github.ref_name }}
            
            **Authentic Gujarati Snacks - D2C App**
            
            ### Download
            - **arm64-v8a** (most modern Android phones)
            - **debug** (for testing)
            
            ### Install
            1. Download the APK
            2. Enable "Install from Unknown Sources" on your Android phone
            3. Transfer APK and tap to install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
