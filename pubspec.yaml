name: jagdish_foods
description: Jagdish Foods - Authentic Gujarati Snacks D2C App | Vadodara's Taste Since 1945
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI / Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.9
  card_swiper: ^3.0.1
  badges: ^3.1.2
  animations: ^2.0.11
  flutter_rating_bar: ^4.0.1
  pinput: ^3.0.1
  dotted_border: ^2.1.0
  step_progress_indicator: ^1.0.2
  timeline_tile: ^2.0.0
  percent_indicator: ^4.2.3
  glassmorphism: ^3.0.0

  # Image / Media
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.2
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  uuid: ^4.3.3
  logger: ^2.2.0
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Firebase (optional - comment out if not using)
  # firebase_core: ^2.24.2
  # firebase_auth: ^4.15.3
  # firebase_messaging: ^14.7.10
  # firebase_analytics: ^10.8.0
  # cloud_firestore: ^4.14.0

  # Razorpay / Payment
  razorpay_flutter: ^1.3.6

  # Maps
  google_maps_flutter: ^2.6.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  retrofit_generator: ^8.1.0
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1
  mocktail: ^1.0.3
  bloc_test: ^9.1.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
